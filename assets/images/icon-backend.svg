<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
  </defs>
  <!-- Server cylinder top -->
  <ellipse cx="20" cy="10" rx="12" ry="3.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Server cylinder sides -->
  <line x1="8"  y1="10" x2="8"  y2="27" stroke="url(#g)" stroke-width="1.8"/>
  <line x1="32" y1="10" x2="32" y2="27" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Server cylinder bottom -->
  <ellipse cx="20" cy="27" rx="12" ry="3.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Mid section divider -->
  <line x1="8" y1="18.5" x2="32" y2="18.5" stroke="url(#g)" stroke-width="1.2" opacity="0.5"/>
  <!-- Status LEDs -->
  <circle cx="15" cy="14.5" r="1.3" fill="url(#g)"/>
  <circle cx="20" cy="14.5" r="1.3" fill="url(#g)" opacity="0.6"/>
  <circle cx="25" cy="14.5" r="1.3" fill="url(#g)" opacity="0.3"/>
  <!-- API arrow -->
  <line x1="14" y1="23" x2="26" y2="23" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polyline points="23,20.5 26,23 23,25.5" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
