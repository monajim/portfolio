<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
  </defs>
  <!-- Outer gear ring -->
  <circle cx="20" cy="20" r="9" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Inner circle -->
  <circle cx="20" cy="20" r="3.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Gear teeth (8 teeth) -->
  <rect x="18.5" y="8"  width="3" height="4" rx="1" fill="url(#g)"/>
  <rect x="18.5" y="28" width="3" height="4" rx="1" fill="url(#g)"/>
  <rect x="8"  y="18.5" width="4" height="3" rx="1" fill="url(#g)"/>
  <rect x="28" y="18.5" width="4" height="3" rx="1" fill="url(#g)"/>
  <!-- Diagonal teeth -->
  <rect x="10.5" y="10.5" width="3" height="4" rx="1" fill="url(#g)" transform="rotate(45 12 12.5)"/>
  <rect x="26.5" y="10.5" width="3" height="4" rx="1" fill="url(#g)" transform="rotate(-45 28 12.5)"/>
  <rect x="10.5" y="25.5" width="3" height="4" rx="1" fill="url(#g)" transform="rotate(-45 12 27.5)"/>
  <rect x="26.5" y="25.5" width="3" height="4" rx="1" fill="url(#g)" transform="rotate(45 28 27.5)"/>
  <!-- Small Docker-like whale hint inside — subtle dot -->
  <circle cx="20" cy="20" r="1.2" fill="url(#g)"/>
</svg>
