<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
  </defs>
  <!-- Stacked layers representing full stack -->
  <!-- Top layer (frontend) -->
  <rect x="6" y="8" width="28" height="7" rx="2" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <line x1="10" y1="11.5" x2="18" y2="11.5" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="28" cy="11.5" r="2" fill="url(#g)"/>
  <!-- Middle layer (backend) -->
  <rect x="6" y="17" width="28" height="7" rx="2" fill="none" stroke="url(#g)" stroke-width="1.8" opacity="0.75"/>
  <line x1="10" y1="20.5" x2="22" y2="20.5" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <circle cx="28" cy="20.5" r="2" fill="url(#g)" opacity="0.75"/>
  <!-- Bottom layer (database) -->
  <rect x="6" y="26" width="28" height="7" rx="2" fill="none" stroke="url(#g)" stroke-width="1.8" opacity="0.5"/>
  <line x1="10" y1="29.5" x2="15" y2="29.5" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="28" cy="29.5" r="2" fill="url(#g)" opacity="0.5"/>
  <!-- Connector dots between layers -->
  <circle cx="20" cy="15.5" r="1" fill="url(#g)"/>
  <circle cx="20" cy="24.5" r="1" fill="url(#g)"/>
</svg>
